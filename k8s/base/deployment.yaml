apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-docs
spec:
  selector:
    matchLabels:
      app: dev-docs
  template:
    metadata:
      labels:
        app: dev-docs
    spec:
      containers:
        - name: nginx
          image: images.local/shms-dev-guides:latest
          ports:
            - containerPort: 8080
